spring.application.name=orbitguard-api

server.port=${PORT:8080}

spring.datasource.url=jdbc:h2:mem:orbitguard;MODE=Oracle;DATABASE_TO_UPPER=false
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

orbitguard.jwt.secret=orbitguard-global-solution-2026-uma-chave-local-de-desenvolvimento
orbitguard.jwt.expiration-minutes=240
orbitguard.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8081}
